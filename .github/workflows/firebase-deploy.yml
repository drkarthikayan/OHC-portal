name: Deploy OHC Portal to Firebase Hosting

on:
  push:
    branches:
      - main        # auto-deploy on every push to main
  workflow_dispatch: # also allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Deploy to Firebase Hosting
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ohc-portal-4f2f8
          channelId: live   # deploys to production (live channel)
